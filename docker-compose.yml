# docker-compose.yml
#
# Three services, mirroring your bare-metal layout (gunicorn behind nginx,
# MySQL as the datastore) but networked instead of unix-socket + systemd.
#
# Quick start:
#   cp .env.example .env   # fill in real values
#   docker compose up --build
#   open http://localhost
#
# First run: visit /admin, log in, click "Reset Database" once to create
# the schema and seed library/branch data from data/*.csv (see README note
# below about ADMIN_PASSWORD and the data/ volume).

services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${DB_NAME:-manga}
      MYSQL_USER:          ${DB_USER:-manga}
      MYSQL_PASSWORD:      ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USER:-manga}", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
    # No host port published by default — only the app container needs to
    # reach MySQL. Add `ports: ["3306:3306"]` (or a docker-compose.override.yml)
    # if you want to connect a local SQL client for debugging.

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind-mounts your existing data/ dir (manga.csv, libraries.csv,
      # branches.csv, flask_sessions/, job_history.json) instead of a
      # named volume, so CSVs you already have locally are used as-is.
      - ./data:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web/static:/static:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  db_data:
