# docker/nginx.conf
#
# Containerized counterpart to manga.nginx (used by the systemd/bare-metal
# deployment). Same shape, two differences:
#   - proxy_pass points at the `app` service over the docker network
#     instead of a unix socket (no shared filesystem between containers).
#   - server_name is a catch-all since this is for local/demo use; swap in
#     your real domain for an actual deployment.

server {
    listen 80;
    server_name _;

    # Serve static files directly — no Python involved. Bind-mounted from
    # ./web/static on the host (see docker-compose.yml), so it stays in
    # sync with the app without needing to rebuild the nginx image.
    location /static/ {
        alias /static/;
        expires 1d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow the browser to poll /api/job/* without timing out
        proxy_read_timeout 60s;

        # Don't buffer — lets the job-poll responses arrive immediately
        proxy_buffering off;
    }

    # Block access to raw data files just in case
    location /data/ { deny all; }
}
