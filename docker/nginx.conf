# docker/nginx.conf
#
# Containerized counterpart to manga.nginx (used by the systemd/bare-metal
# deployment). Differences from that file:
#   - proxy_pass points at the `app` service over the docker network
#     instead of a unix socket (no shared filesystem between containers).
#   - server_name is a catch-all since this is for local/demo use; swap in
#     your real domain for an actual deployment.
#
# WHY THE resolver + $app_upstream VARIABLE (and not a plain
# `proxy_pass http://app:8000;`):
#   nginx resolves a *literal* hostname in proxy_pass exactly once, at
#   config-load time, and caches that IP for as long as the nginx worker
#   process lives. Every time `app` gets rebuilt/recreated (docker compose
#   up -d --build app) — and especially after adding a *new* service to the
#   compose network (e.g. `worker`), which can shuffle IP assignment —
#   Docker hands the recreated `app` container a different internal IP.
#   nginx never finds out, keeps sending traffic to the stale IP, and you
#   get "502 Bad Gateway" / "connect() failed (111: Connection refused)"
#   even though `app` is up and its own healthcheck is green (the
#   healthcheck hits localhost:8000 *inside* the app container, bypassing
#   DNS entirely, so it stays oblivious to this).
#
#   Putting the hostname in a variable forces nginx to resolve it at
#   *request* time using the `resolver` directive instead of once at
#   startup — `127.0.0.11` is Docker Compose's embedded DNS server, always
#   available to every container on a compose network. `valid=10s` caps how
#   long a resolved IP is trusted before nginx looks it up again, so a
#   container recreation is picked up within ~10 seconds with zero manual
#   intervention (no more `docker compose restart nginx` after every app
#   rebuild).

server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s;
    set $app_upstream app:8000;

    # Serve static files directly — no Python involved. Bind-mounted from
    # ./web/static on the host (see docker-compose.yml), so it stays in
    # sync with the app without needing to rebuild the nginx image.
    location /static/ {
        alias /static/;
        expires 1d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass         http://$app_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow the browser to poll /api/job/* without timing out
        proxy_read_timeout 60s;

        # Don't buffer — lets the job-poll responses arrive immediately
        proxy_buffering off;
    }

    # Block access to raw data files just in case
    location /data/ { deny all; }
}
