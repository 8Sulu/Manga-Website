<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Manga Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='admin_login.css') }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
</head>
<body class="login-page">

<div class="login-card">
  <div class="login-header">
    <div class="login-eyebrow">Manga Tracker</div>
    <div class="login-title">Admin <span>Access</span></div>
    <div class="login-sub">管理パネル — restricted area</div>
  </div>

  <div class="login-body">
    {% if error %}<div class="login-error">{{ error }}</div>{% endif %}

    <form method="POST"
          action="{{ url_for('admin_login') }}{% if request.args.get('next') %}?next={{ request.args.get('next')|urlencode }}{% endif %}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="login-field">
        <label class="login-label" for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" name="password" id="password"
                 placeholder="Enter admin password"
                 autocomplete="current-password" autofocus required>
          <button type="button" class="pw-toggle" id="pw-toggle"
                  onclick="togglePw()" title="Show/hide">👁</button>
        </div>
      </div>
      <button type="submit" class="btn login-btn">Sign in →</button>
    </form>
  </div>

  <div class="login-footer">
    <a href="/">← Back to public site</a>
  </div>
</div>

<script src="{{ url_for('static', filename='admin_login.js') }}"></script>
</body>
</html>
