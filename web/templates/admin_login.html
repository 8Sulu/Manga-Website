<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login — Manga Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      position: relative;
    }


    .login-header {
      padding: 2rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg3);
      text-align: center;
    }

    .login-eyebrow {
      font-family: var(--mono);
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--purple);
      margin-bottom: .75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .login-eyebrow::before,
    .login-eyebrow::after {
      content: '';
      display: inline-block;
      width: 20px;
      height: 1px;
      background: var(--purple);
      opacity: .5;
    }

    .login-title {
      font-family: var(--display);
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--text);
      line-height: 1;
      margin-bottom: .3rem;
    }
    .login-title span {
      background: var(--green);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-sub {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--text3);
      letter-spacing: .04em;
    }

    .login-body {
      padding: 1.75rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: .45rem;
    }

    .login-label {
      font-family: var(--mono);
      font-size: .62rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text3);
    }

    .login-input-wrap {
      position: relative;
    }

    .login-input-wrap input {
      padding-right: 2.5rem;
    }

    .pw-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--text3);
      font-size: .75rem;
      width: auto;
      min-width: 0;
      line-height: 1;
      transition: color .15s;
    }
    .pw-toggle:hover { color: var(--text2); background: none; border: none; }

    .login-error {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: .6rem .85rem;
      background: var(--red-bg);
      border: 1px solid var(--red-brd);
      border-radius: var(--r);
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--red);
    }
    .login-error::before { content: '✗'; flex-shrink: 0; }

    .login-btn {
      width: 100%;
      justify-content: center;
      background: linear-gradient(135deg, var(--purple2), var(--purple));
      border-color: transparent;
      color: #fff;
      padding: 10px;
      font-size: .78rem;
      letter-spacing: .06em;
      box-shadow: 0 2px 20px rgba(157,125,255,.25);
      transition: box-shadow .15s, transform .15s;
    }
    .login-btn:hover {
      box-shadow: 0 4px 30px rgba(157,125,255,.4);
      transform: translateY(-1px);
    }

    .login-footer {
      padding: .75rem 2rem 1.25rem;
      text-align: center;
    }
    .login-footer a {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--text3);
      transition: color .15s;
    }
    .login-footer a:hover { color: var(--purple); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <div class="login-header">
      <div class="login-eyebrow">Manga Tracker</div>
      <div class="login-title">Admin <span>Access</span></div>
      <div class="login-sub">管理パネル — restricted area</div>
    </div>

    <div class="login-body">
      {% if error %}
      <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="POST" action="{{ url_for('admin_login') }}{% if request.args.get('next') %}?next={{ request.args.get('next')|urlencode }}{% endif %}">
        <div class="login-field" style="margin-bottom:1rem">
          <label class="login-label" for="password">Password</label>
          <div class="login-input-wrap">
            <input type="password" name="password" id="password"
                   placeholder="Enter admin password"
                   autocomplete="current-password"
                   autofocus required>
            <button type="button" class="pw-toggle" id="pw-toggle"
                    onclick="togglePw()" title="Show/hide password">👁</button>
          </div>
        </div>

        <button type="submit" class="btn login-btn">
          Sign in →
        </button>
      </form>
    </div>

    <div class="login-footer">
      <a href="/">← Back to public site</a>
    </div>
  </div>
</div>

<script>
function togglePw() {
  const input = document.getElementById('password');
  const btn   = document.getElementById('pw-toggle');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = '🙈';
  } else {
    input.type = 'password';
    btn.textContent = '👁';
  }
}

// Auto-clear error styling on new input
document.getElementById('password').addEventListener('input', function() {
  const err = document.querySelector('.login-error');
  if (err) err.style.opacity = '0.5';
});
</script>
</body>
</html>
